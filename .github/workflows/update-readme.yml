name: Update README

on:
  push:
    branches: [main]
    paths:
      - "index.json"
      - "skills/*/SKILL.md"

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Regenerate skill table
        run: python3 .github/scripts/gen-readme.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet README.md || (
            git add README.md &&
            git commit -m "chore: sync README skill table [skip ci]" &&
            git push
          )
